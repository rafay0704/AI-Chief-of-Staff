root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 500
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "bin", "internal/repository"]
  exclude_regex = ["_test.go"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
