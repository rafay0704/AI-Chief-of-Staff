version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # sqlc-generated code
      - path: internal/repository/
        linters:
          - revive
          - unused

formatters:
  enable:
    - gofumpt
    - goimports
