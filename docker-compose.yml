services:
  postgres:
    image: postgres:17-alpine
    container_name: acos_postgres
    environment:
      POSTGRES_USER: acos
      POSTGRES_PASSWORD: acos_dev_pw
      POSTGRES_DB: acos
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (5432 often taken by a local Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acos -d acos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: acos_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:5
    container_name: acos_adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
